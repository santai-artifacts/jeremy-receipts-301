<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      padding: 30px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    .section {
      display: flex;
      flex-direction: column;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .form-group.full {
      flex-direction: column;
      align-items: stretch;
    }

    .form-group.full .input-wrapper {
      display: flex;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
    }

    input[type="text"],
    input[type="number"],
    select {
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    input[type="text"],
    input[type="number"] {
      flex: 1;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #edf2f7;
      color: #2d3748;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .btn-danger {
      background: #fc8181;
      color: white;
      padding: 6px 10px;
      font-size: 12px;
    }

    .btn-danger:hover {
      background: #f56565;
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item-card {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .item-info {
      flex: 1;
    }

    .item-name {
      font-weight: 600;
      color: #2d3748;
      font-size: 14px;
    }

    .item-details {
      font-size: 12px;
      color: #718096;
      margin-top: 4px;
    }

    .item-price {
      font-size: 16px;
      font-weight: 700;
      color: #667eea;
      text-align: right;
      min-width: 70px;
    }

    .people-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .person-card {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .person-info {
      flex: 1;
    }

    .person-name {
      font-weight: 600;
      color: #2d3748;
      font-size: 14px;
    }

    .person-items {
      font-size: 12px;
      color: #718096;
      margin-top: 4px;
    }

    .person-total {
      text-align: right;
    }

    .person-subtotal {
      font-size: 12px;
      color: #718096;
    }

    .person-amount {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .summary-section {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      padding-top: 20px;
      border-top: 2px solid #e2e8f0;
    }

    .summary-box {
      background: #f7fafc;
      padding: 16px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .summary-label {
      font-size: 12px;
      color: #718096;
      margin-bottom: 6px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 700;
      color: #2d3748;
    }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #a0aec0;
    }

    .empty-state-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .currency {
      font-size: 0.85em;
      color: #a0aec0;
      margin-right: 2px;
    }

    .checkbox-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    input[type="checkbox"] {
      cursor: pointer;
      width: 18px;
      height: 18px;
      accent-color: #667eea;
    }

    .checkbox-item label {
      margin: 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: normal;
    }

    .tax-tip-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💰 Receipt Calculator</h1>
      <p>Split bills easily with friends</p>
    </div>

    <div class="content">
      <!-- Left Column: Add Items and People -->
      <div>
        <!-- Add People Section -->
        <div class="section">
          <h2 class="section-title">People</h2>
          <div class="form-group full">
            <div class="input-wrapper">
              <input type="text" id="personName" placeholder="Enter person's name (e.g., Alice)" />
              <button class="btn btn-primary" onclick="addPerson()">Add Person</button>
            </div>
          </div>
          <div class="people-list" id="peopleList">
            <div class="empty-state">
              <div class="empty-state-icon">👥</div>
              <p>Add people to get started</p>
            </div>
          </div>
        </div>

        <!-- Add Items Section -->
        <div class="section" style="margin-top: 30px;">
          <h2 class="section-title">Items</h2>
          <div class="form-group full">
            <label>Item Name</label>
            <input type="text" id="itemName" placeholder="e.g., Caesar Salad" />
          </div>
          <div class="form-group full">
            <label>Price</label>
            <input type="number" id="itemPrice" placeholder="12.50" min="0" step="0.01" />
          </div>
          <div class="form-group full">
            <label>Quantity</label>
            <input type="number" id="itemQuantity" value="1" min="1" step="1" />
          </div>
          <div class="form-group full">
            <label>Who had this?</label>
            <div class="checkbox-wrapper" id="itemPersons"></div>
          </div>
          <button class="btn btn-primary" onclick="addItem()" style="align-self: flex-start;">Add Item</button>

          <div class="item-list" id="itemList" style="margin-top: 20px;">
            <div class="empty-state">
              <div class="empty-state-icon">🍽️</div>
              <p>Add items to calculate</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column: Summary -->
      <div>
        <!-- Tax & Tip Section -->
        <div class="section">
          <h2 class="section-title">Settings</h2>
          <div class="tax-tip-group">
            <div class="form-group full">
              <label>Tax (%)</label>
              <input type="number" id="taxPercent" value="0" min="0" max="100" step="0.1" onchange="calculate()" />
            </div>
            <div class="form-group full">
              <label>Tip (%)</label>
              <input type="number" id="tipPercent" value="0" min="0" max="100" step="0.1" onchange="calculate()" />
            </div>
          </div>
        </div>

        <!-- Summary Section -->
        <div class="section" style="margin-top: 30px;">
          <h2 class="section-title">Summary</h2>
          <div class="summary-box">
            <div class="summary-label">Subtotal</div>
            <div class="summary-value"><span class="currency">$</span><span id="subtotal">0.00</span></div>
          </div>
          <div class="summary-box">
            <div class="summary-label">Tax</div>
            <div class="summary-value"><span class="currency">$</span><span id="taxAmount">0.00</span></div>
          </div>
          <div class="summary-box">
            <div class="summary-label">Tip</div>
            <div class="summary-value"><span class="currency">$</span><span id="tipAmount">0.00</span></div>
          </div>
          <div class="summary-box" style="border-left-color: #764ba2;">
            <div class="summary-label">Total</div>
            <div class="summary-value"><span class="currency">$</span><span id="total">0.00</span></div>
          </div>
        </div>

        <!-- People Breakdown -->
        <div class="section" style="margin-top: 30px;">
          <h2 class="section-title">Each Person Owes</h2>
          <div class="people-list" id="breakdownList">
            <div class="empty-state">
              <div class="empty-state-icon">📊</div>
              <p>Breakdown will appear here</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let people = [];
    let items = [];

    function addPerson() {
      const input = document.getElementById('personName');
      const name = input.value.trim();

      if (!name) {
        alert('Please enter a name');
        return;
      }

      people.push({ id: Date.now(), name });
      input.value = '';
      render();
      calculate();
    }

    function removePerson(id) {
      people = people.filter(p => p.id !== id);
      items = items.map(item => ({
        ...item,
        persons: item.persons.filter(pid => pid !== id)
      }));
      render();
      calculate();
    }

    function addItem() {
      const name = document.getElementById('itemName').value.trim();
      const price = parseFloat(document.getElementById('itemPrice').value);
      const quantity = parseInt(document.getElementById('itemQuantity').value);
      const selectedPersons = Array.from(document.querySelectorAll('#itemPersons input:checked')).map(cb => parseInt(cb.value));

      if (!name) {
        alert('Please enter an item name');
        return;
      }

      if (!price || price <= 0) {
        alert('Please enter a valid price');
        return;
      }

      if (selectedPersons.length === 0) {
        alert('Please select at least one person');
        return;
      }

      items.push({
        id: Date.now(),
        name,
        price,
        quantity,
        persons: selectedPersons
      });

      document.getElementById('itemName').value = '';
      document.getElementById('itemPrice').value = '';
      document.getElementById('itemQuantity').value = '1';
      document.querySelectorAll('#itemPersons input').forEach(cb => cb.checked = false);

      render();
      calculate();
    }

    function removeItem(id) {
      items = items.filter(item => item.id !== id);
      render();
      calculate();
    }

    function render() {
      renderPeople();
      renderItems();
      renderPersonCheckboxes();
    }

    function renderPeople() {
      const list = document.getElementById('peopleList');
      if (people.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👥</div><p>Add people to get started</p></div>';
        return;
      }

      list.innerHTML = people.map(person => `
        <div class="person-card">
          <div class="person-info">
            <div class="person-name">${person.name}</div>
          </div>
          <button class="btn btn-danger" onclick="removePerson(${person.id})">Remove</button>
        </div>
      `).join('');
    }

    function renderItems() {
      const list = document.getElementById('itemList');
      if (items.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🍽️</div><p>Add items to calculate</p></div>';
        return;
      }

      list.innerHTML = items.map(item => {
        const personNames = item.persons.map(pid => people.find(p => p.id === pid)?.name).filter(Boolean).join(', ');
        const total = (item.price * item.quantity).toFixed(2);
        return `
          <div class="item-card">
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-details">
                $${item.price.toFixed(2)} × ${item.quantity} • ${personNames}
              </div>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
              <div class="item-price">$${total}</div>
              <button class="btn btn-danger" onclick="removeItem(${item.id})">×</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderPersonCheckboxes() {
      const wrapper = document.getElementById('itemPersons');
      if (people.length === 0) {
        wrapper.innerHTML = '<p style="font-size: 12px; color: #a0aec0;">Add people first</p>';
        return;
      }

      wrapper.innerHTML = people.map(person => `
        <div class="checkbox-item">
          <input type="checkbox" id="person_${person.id}" value="${person.id}" />
          <label for="person_${person.id}">${person.name}</label>
        </div>
      `).join('');
    }

    function calculate() {
      // Calculate subtotal
      const subtotal = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);

      // Calculate tax and tip
      const taxPercent = parseFloat(document.getElementById('taxPercent').value) || 0;
      const tipPercent = parseFloat(document.getElementById('tipPercent').value) || 0;

      const taxAmount = subtotal * (taxPercent / 100);
      const tipAmount = (subtotal + taxAmount) * (tipPercent / 100);
      const total = subtotal + taxAmount + tipAmount;

      // Update summary
      document.getElementById('subtotal').textContent = subtotal.toFixed(2);
      document.getElementById('taxAmount').textContent = taxAmount.toFixed(2);
      document.getElementById('tipAmount').textContent = tipAmount.toFixed(2);
      document.getElementById('total').textContent = total.toFixed(2);

      // Calculate per-person breakdown
      const breakdown = {};
      people.forEach(person => {
        breakdown[person.id] = { name: person.name, subtotal: 0, items: [] };
      });

      items.forEach(item => {
        const itemTotal = item.price * item.quantity;
        const splitAmount = itemTotal / item.persons.length;

        item.persons.forEach(personId => {
          breakdown[personId].subtotal += splitAmount;
          breakdown[personId].items.push(`${item.name} (${item.quantity})`);
        });
      });

      // Apply tax and tip proportionally
      Object.values(breakdown).forEach(person => {
        const personTax = person.subtotal * (taxPercent / 100);
        const personTip = (person.subtotal + personTax) * (tipPercent / 100);
        person.tax = personTax;
        person.tip = personTip;
        person.total = person.subtotal + personTax + personTip;
      });

      renderBreakdown(breakdown);
    }

    function renderBreakdown(breakdown) {
      const list = document.getElementById('breakdownList');
      const validPeople = Object.values(breakdown).filter(person => person.subtotal > 0);

      if (validPeople.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><p>Breakdown will appear here</p></div>';
        return;
      }

      list.innerHTML = validPeople.map(person => `
        <div class="person-card">
          <div class="person-info">
            <div class="person-name">${person.name}</div>
            <div class="person-items" style="font-size: 11px; max-height: 40px; overflow: hidden;">
              ${person.items.join(', ')}
            </div>
          </div>
          <div class="person-total">
            <div class="person-subtotal">
              Subtotal: $${person.subtotal.toFixed(2)}
            </div>
            <div class="person-subtotal">
              Tax: $${person.tax.toFixed(2)} + Tip: $${person.tip.toFixed(2)}
            </div>
            <div class="person-amount">$${person.total.toFixed(2)}</div>
          </div>
        </div>
      `).join('');
    }

    // Initial render
    render();
  </script>
</body>
</html>
