<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Handlee&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Handlee', cursive;
      background: linear-gradient(135deg, #faf6f1 0%, #fffbf5 50%, #f5f0eb 100%);
      min-height: 100vh;
      padding: 20px;
      background-attachment: fixed;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(90deg, #c62828 50%, transparent 50%),
        linear-gradient(#c62828 50%, transparent 50%);
      background-size: 30px 30px;
      background-position: 0 0, 15px 15px;
      opacity: 0.08;
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fffdf7;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(196, 30, 58, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      overflow: hidden;
      border: 4px solid #c62828;
      position: relative;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 44px;
      left: 0;
      right: 0;
      height: 20px;
      background-image:
        linear-gradient(90deg, #c62828 50%, white 50%),
        linear-gradient(white 50%, #c62828 50%);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
      z-index: 2;
    }

    .container::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      background-image:
        linear-gradient(90deg, #c62828 50%, white 50%),
        linear-gradient(white 50%, #c62828 50%);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
      z-index: 1;
    }

    .header {
      background-image:
        linear-gradient(90deg, #c62828 50%, white 50%),
        linear-gradient(white 50%, #c62828 50%);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
      padding: 30px;
      text-align: center;
      border-bottom: 4px solid #c62828;
      position: relative;
      padding-top: 60px;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 0;
      right: 0;
      height: 36px;
      background-image: url('data:image/svg+xml;utf8,<svg width="120" height="36" viewBox="0 0 120 36" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><defs><pattern id="coil" x="0" y="0" width="20" height="36" patternUnits="userSpaceOnUse"><g><circle cx="10" cy="10" r="5.5" fill="%23999" stroke="%23666" stroke-width="1"/><circle cx="10" cy="26" r="5.5" fill="%23999" stroke="%23666" stroke-width="1"/><path d="M 10 15 Q 12 18 10 21" stroke="%23666" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M 10 5 Q 12 2 10 1" stroke="%23666" stroke-width="1.5" fill="none" stroke-linecap="round"/></g></pattern></defs><rect width="120" height="36" fill="none"/><rect width="120" height="36" fill="url(%23coil)"/></svg>');
      background-repeat: repeat-x;
      background-size: 20px 36px;
      z-index: 1;
    }

    .header h1 {
      font-family: 'Caveat', cursive;
      font-size: 48px;
      margin-bottom: 8px;
      font-weight: 700;
      text-shadow: 2px 2px 0 #333, -2px -2px 0 #333, 2px -2px 0 #333, -2px 2px 0 #333;
      color: white;
      position: relative;
      z-index: 2;
    }

    .header p {
      opacity: 0.95;
      font-size: 16px;
      font-style: italic;
      color: white;
      text-shadow: 1px 1px 0 #333, -1px -1px 0 #333, 1px -1px 0 #333, -1px 1px 0 #333;
      position: relative;
      z-index: 2;
    }

    .content {
      padding: 30px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 30px;
    }

    @media (max-width: 1024px) {
      .content {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    .section {
      display: flex;
      flex-direction: column;
      background: #fffdf7;
      border: 3px solid #c62828;
      border-radius: 15px;
      padding: 20px;
      position: relative;
      box-shadow: 0 4px 10px rgba(196, 30, 58, 0.1);
    }

    .section::before {
      content: '';
      position: absolute;
      top: -18px;
      left: 20px;
      width: 36px;
      height: 36px;
      background-image:
        linear-gradient(90deg, #c62828 50%, white 50%),
        linear-gradient(white 50%, #c62828 50%);
      background-size: 12px 12px;
      background-position: 0 0, 6px 6px;
      border: 2px solid #c62828;
      border-radius: 50%;
      z-index: 1;
    }

    .section-title {
      font-family: 'Caveat', cursive;
      font-size: 28px;
      font-weight: 700;
      color: #c62828;
      margin-bottom: 16px;
      text-transform: none;
      letter-spacing: 1px;
      border-bottom: 3px dashed #c62828;
      padding-bottom: 10px;
      margin-top: 10px;
    }

    .form-group {
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .form-group.full {
      flex-direction: column;
      align-items: stretch;
    }

    .form-group.full .input-wrapper {
      display: flex;
      gap: 12px;
    }

    label {
      display: block;
      font-family: 'Handlee', cursive;
      font-size: 14px;
      font-weight: 600;
      color: #c62828;
      margin-bottom: 6px;
      text-transform: none;
      letter-spacing: 0px;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
    }

    input[type="text"],
    input[type="number"],
    select {
      padding: 12px 14px;
      border: 2px solid #c62828;
      border-radius: 12px;
      font-family: 'Handlee', cursive;
      font-size: 15px;
      transition: all 0.3s;
      flex: 1;
      background: #fffdf7;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #a01f20;
      background: white;
      box-shadow: 0 0 0 3px rgba(196, 30, 58, 0.2);
    }

    .btn {
      padding: 11px 18px;
      border: 2px solid #c62828;
      border-radius: 12px;
      font-family: 'Handlee', cursive;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #c62828;
      color: white;
      border-color: #c62828;
    }

    .btn-primary:hover {
      background: #a01f20;
      border-color: #a01f20;
      transform: translateY(-3px);
      box-shadow: 0 8px 16px rgba(196, 30, 58, 0.2);
    }

    .btn-primary:active {
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f5f0eb;
      color: #c62828;
      border-color: #c62828;
    }

    .btn-secondary:hover {
      background: #ede5dd;
    }

    .btn-small {
      padding: 7px 11px;
      font-size: 13px;
    }

    .btn-danger {
      background: #e8b4a8;
      color: #5c2a23;
      border-color: #c97860;
    }

    .btn-danger:hover {
      background: #dc9d8f;
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
      overflow-y: auto;
      max-height: 600px;
    }

    .item-card {
      background: #fffdf7;
      border: 2px solid #c62828;
      border-radius: 12px;
      padding: 14px;
      position: relative;
      box-shadow: 0 4px 8px rgba(196, 30, 58, 0.08);
    }

    .item-card::before {
      content: '';
      position: absolute;
      right: 12px;
      top: 12px;
      opacity: 0.2;
      font-size: 18px;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .item-name {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      color: #c62828;
      font-size: 16px;
      flex: 1;
    }

    .item-price {
      font-family: 'Caveat', cursive;
      font-size: 18px;
      font-weight: 700;
      color: #c62828;
    }

    .item-details {
      font-family: 'Handlee', cursive;
      font-size: 13px;
      color: #c62828;
      margin-bottom: 8px;
    }

    .item-persons {
      flex-wrap: wrap;
      gap: 6px;
      display: flex;
      margin-bottom: 8px;
    }

    .person-tag {
      background: #fff5f0;
      border: 2px dashed #c62828;
      border-radius: 8px;
      padding: 4px 10px;
      font-family: 'Handlee', cursive;
      font-size: 12px;
      color: #c62828;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .assign-persons-btn {
      font-size: 11px;
      padding: 4px 8px;
    }

    .people-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      overflow-y: auto;
      max-height: 600px;
    }

    .person-card {
      background: #fffdf7;
      border: 2px dashed #c62828;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 8px rgba(196, 30, 58, 0.08);
    }

    .person-name {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      color: #c62828;
      font-size: 16px;
      flex: 1;
    }

    .summary-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .summary-box {
      background: #fffdf7;
      padding: 16px;
      border-radius: 12px;
      border-left: 5px solid #c62828;
      border: 2px solid #c62828;
      box-shadow: 0 4px 8px rgba(196, 30, 58, 0.08);
    }

    .summary-label {
      font-family: 'Handlee', cursive;
      font-size: 13px;
      color: #c62828;
      margin-bottom: 6px;
      text-transform: none;
      font-weight: 600;
      letter-spacing: 0px;
    }

    .summary-value {
      font-family: 'Caveat', cursive;
      font-size: 32px;
      font-weight: 700;
      color: #c62828;
    }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #c62828;
      font-size: 14px;
      opacity: 0.6;
    }

    .empty-state-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .currency {
      font-size: 0.85em;
      color: #c62828;
      margin-right: 2px;
      opacity: 0.7;
    }

    .pricing-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .toggle-btn {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #c62828;
      background: #f5f0eb;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Handlee', cursive;
      font-size: 13px;
      font-weight: 600;
      color: #c62828;
      transition: all 0.2s;
    }

    .toggle-btn.active {
      border-color: #c62828;
      background: #c62828;
      color: white;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(196, 30, 58, 0.3);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #fffdf7;
      border-radius: 16px;
      padding: 30px;
      max-width: 420px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      border: 3px solid #c62828;
      box-shadow: 0 20px 40px rgba(196, 30, 58, 0.25);
    }

    .modal-title {
      font-family: 'Caveat', cursive;
      font-size: 26px;
      font-weight: 700;
      color: #c62828;
      margin-bottom: 20px;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 20px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="checkbox"] {
      cursor: pointer;
      width: 20px;
      height: 20px;
      accent-color: #c62828;
    }

    .checkbox-item label {
      margin: 0;
      cursor: pointer;
      font-family: 'Handlee', cursive;
      font-size: 15px;
      color: #c62828;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .person-breakdown {
      background: white;
      border: 2px solid #c62828;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: 0 4px 8px rgba(196, 30, 58, 0.08);
    }

    .person-breakdown-name {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      color: #c62828;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .person-breakdown-items {
      font-family: 'Handlee', cursive;
      font-size: 12px;
      color: #c62828;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .person-breakdown-amounts {
      display: flex;
      justify-content: space-between;
      padding-top: 8px;
      border-top: 2px dashed #c62828;
    }

    .person-breakdown-subtotal {
      font-family: 'Handlee', cursive;
      font-size: 12px;
      color: #c62828;
    }

    .person-breakdown-total {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      color: #c62828;
      font-size: 20px;
    }

    .tax-tip-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tax-tip-toggle button {
      flex: 1;
      padding: 6px 10px;
      font-size: 12px;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f5f0eb;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #c62828;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a01f20;
    }

    .breakdown-section-header {
      position: relative;
      padding-top: 30px;
      margin-bottom: 16px;
    }

    .spiral-coil {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .coil-ring {
      width: 14px;
      height: 14px;
      border: 2.5px solid #c62828;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Receipt Book</h1>
      <p>Keep track of who owes what</p>
    </div>

    <div class="content">
      <!-- Column 1: Add People -->
      <div>
        <div class="section">
          <h2 class="section-title">People</h2>
          <div class="form-group full">
            <div class="input-wrapper">
              <input type="text" id="personName" placeholder="e.g., Alice" onkeypress="if(event.key === 'Enter') addPerson()" />
              <button class="btn btn-primary btn-small" onclick="addPerson()">Add</button>
            </div>
          </div>
          <div class="people-list" id="peopleList">
            <div class="empty-state">
              <div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#c62828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="4"/><path d="M8 20h8v12H8z"/><circle cx="36" cy="10" r="4"/><path d="M32 20h8v12h-8z"/></svg></div>
              <p>Add people to get started</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Column 2: Add Items -->
      <div>
        <div class="section">
          <h2 class="section-title">Items</h2>

          <div class="form-group full">
            <label>Item Name</label>
            <input type="text" id="itemName" placeholder="e.g., Caesar Salad" onkeypress="if(event.key === 'Enter') addItem()" />
          </div>

          <div class="form-group full">
            <label>Quantity</label>
            <input type="number" id="itemQuantity" value="1" min="1" step="1" onkeypress="if(event.key === 'Enter') addItem()" />
          </div>

          <label>Price</label>
          <div class="pricing-toggle">
            <button class="toggle-btn active" onclick="setPricingMode('individual')">Price Each</button>
            <button class="toggle-btn" onclick="setPricingMode('total')">Total Price</button>
          </div>

          <div class="form-group full">
            <label id="priceLabel">Price per item</label>
            <input type="number" id="itemPrice" placeholder="12.50" min="0" step="0.01" onkeypress="if(event.key === 'Enter') addItem()" />
          </div>

          <button class="btn btn-primary" onclick="addItem()" style="align-self: flex-start;">Add Item</button>

          <div class="item-list" id="itemList" style="margin-top: 20px;">
            <div class="empty-state">
              <div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#c62828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 14h32v22c0 2-2 4-4 4H12c-2 0-4-2-4-4V14z"/><circle cx="16" cy="10" r="2.5" fill="#c62828"/><circle cx="24" cy="8" r="2.5" fill="#c62828"/><circle cx="32" cy="10" r="2.5" fill="#c62828"/></svg></div>
              <p>Add items to get started</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Column 3: Summary & Breakdown -->
      <div>
        <!-- Settings -->
        <div class="section">
          <h2 class="section-title">Settings</h2>

          <label>Tax</label>
          <div class="tax-tip-toggle">
            <button class="toggle-btn active" onclick="setTaxMode('percent')">%</button>
            <button class="toggle-btn" onclick="setTaxMode('flat')">Flat $</button>
          </div>
          <div class="form-group full">
            <input type="number" id="taxAmount" value="0" min="0" step="0.01" onchange="calculate()" onkeypress="if(event.key === 'Enter') calculate()" />
          </div>

          <label style="margin-top: 12px;">Tip</label>
          <div class="tax-tip-toggle">
            <button class="toggle-btn active" onclick="setTipMode('percent')">%</button>
            <button class="toggle-btn" onclick="setTipMode('flat')">Flat $</button>
          </div>
          <div class="form-group full">
            <input type="number" id="tipAmount" value="0" min="0" step="0.01" onchange="calculate()" onkeypress="if(event.key === 'Enter') calculate()" />
          </div>
        </div>

        <!-- Summary -->
        <div class="section" style="margin-top: 20px;">
          <h2 class="section-title">Summary</h2>
          <div class="summary-section">
            <div class="summary-box">
              <div class="summary-label">Subtotal</div>
              <div class="summary-value"><span class="currency">$</span><span id="subtotal">0.00</span></div>
            </div>
            <div class="summary-box">
              <div class="summary-label">Tax</div>
              <div class="summary-value"><span class="currency">$</span><span id="taxDisplay">0.00</span></div>
            </div>
            <div class="summary-box">
              <div class="summary-label">Tip</div>
              <div class="summary-value"><span class="currency">$</span><span id="tipDisplay">0.00</span></div>
            </div>
            <div class="summary-box" style="border-left-color: #c62828;">
              <div class="summary-label">Total</div>
              <div class="summary-value"><span class="currency">$</span><span id="total">0.00</span></div>
            </div>
          </div>
        </div>

        <!-- Per-Person Breakdown -->
        <div class="section" style="margin-top: 20px;">
          <div class="breakdown-section-header">
            <div class="spiral-coil">
              <div class="coil-ring"></div>
              <div class="coil-ring"></div>
              <div class="coil-ring"></div>
              <div class="coil-ring"></div>
              <div class="coil-ring"></div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <h2 class="section-title" style="margin-bottom: 0;">Who Owes What</h2>
              <button class="btn btn-primary btn-small" onclick="copyBreakdown()" style="margin-top: 0;">Copy</button>
            </div>
          </div>
          <div id="breakdownList" style="flex: 1; overflow-y: auto;">
            <div class="empty-state">
              <div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#c62828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="32" height="36" rx="2"/><line x1="14" y1="14" x2="34" y2="14"/><line x1="14" y1="20" x2="34" y2="20"/><line x1="14" y1="26" x2="34" y2="26"/><line x1="14" y1="32" x2="28" y2="32"/></svg></div>
              <p>Breakdown will appear here</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal for assigning people to items -->
  <div class="modal-overlay" id="assignModal">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Assign to people</div>
      <div class="checkbox-group" id="modalCheckboxes"></div>
      <div class="modal-buttons">
        <button class="btn btn-secondary btn-small" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary btn-small" onclick="saveAssignment()">Done</button>
      </div>
    </div>
  </div>

  <!-- Modal for editing items -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-title">Edit Item</div>
      <div class="form-group full">
        <label>Item Name</label>
        <input type="text" id="editItemName" />
      </div>
      <div class="form-group full">
        <label>Quantity</label>
        <input type="number" id="editItemQuantity" min="1" step="1" />
      </div>
      <label>Price</label>
      <div class="pricing-toggle">
        <button class="toggle-btn active" onclick="setEditPricingMode('individual')">Price Each</button>
        <button class="toggle-btn" onclick="setEditPricingMode('total')">Total Price</button>
      </div>
      <div class="form-group full">
        <label id="editPriceLabel">Price per item</label>
        <input type="number" id="editItemPrice" min="0" step="0.01" />
      </div>
      <div class="modal-buttons">
        <button class="btn btn-secondary btn-small" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-primary btn-small" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let people = [];
    let items = [];
    let pricingMode = 'individual';
    let editPricingMode = 'individual';
    let currentEditingItemId = null;
    let currentAssigningItemId = null;
    let taxMode = 'percent';
    let tipMode = 'percent';

    function setPricingMode(mode) {
      pricingMode = mode;
      const label = document.getElementById('priceLabel');
      label.textContent = mode === 'individual' ? 'Price per item' : 'Total price for all';
      document.querySelectorAll('.pricing-toggle .toggle-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }

    function setEditPricingMode(mode) {
      editPricingMode = mode;
      const label = document.getElementById('editPriceLabel');
      label.textContent = mode === 'individual' ? 'Price per item' : 'Total price for all';
      document.querySelectorAll('#editModal .pricing-toggle .toggle-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }

    function setTaxMode(mode) {
      taxMode = mode;
      const label = document.getElementById('taxAmount');
      label.placeholder = mode === 'percent' ? '0' : '0.00';
      document.querySelectorAll('.tax-tip-toggle')[0].querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      calculate();
    }

    function setTipMode(mode) {
      tipMode = mode;
      const label = document.getElementById('tipAmount');
      label.placeholder = mode === 'percent' ? '0' : '0.00';
      document.querySelectorAll('.tax-tip-toggle')[1].querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      calculate();
    }

    function addPerson() {
      const input = document.getElementById('personName');
      const name = input.value.trim();

      if (!name) {
        alert('Please enter a name');
        return;
      }

      people.push({ id: Date.now(), name });
      input.value = '';
      renderPeople();
      renderItemList();
      calculate();
    }

    function removePerson(id) {
      people = people.filter(p => p.id !== id);
      items = items.map(item => ({
        ...item,
        persons: item.persons.filter(pid => pid !== id)
      }));
      renderPeople();
      renderItemList();
      calculate();
    }

    function addItem() {
      const name = document.getElementById('itemName').value.trim();
      const price = parseFloat(document.getElementById('itemPrice').value);
      const quantity = parseInt(document.getElementById('itemQuantity').value);

      if (!name) {
        alert('Please enter an item name');
        return;
      }

      if (!price || price < 0) {
        alert('Please enter a valid price');
        return;
      }

      let unitPrice = price;
      if (pricingMode === 'total') {
        unitPrice = price / quantity;
      }

      items.push({
        id: Date.now(),
        name,
        unitPrice,
        quantity,
        persons: []
      });

      document.getElementById('itemName').value = '';
      document.getElementById('itemPrice').value = '';
      document.getElementById('itemQuantity').value = '1';

      renderItemList();
      calculate();
    }

    function removeItem(id) {
      items = items.filter(item => item.id !== id);
      renderItemList();
      calculate();
    }

    function openEditModal(itemId) {
      const item = items.find(i => i.id === itemId);
      currentEditingItemId = itemId;
      editPricingMode = 'individual';

      document.getElementById('editItemName').value = item.name;
      document.getElementById('editItemQuantity').value = item.quantity;
      document.getElementById('editItemPrice').value = item.unitPrice.toFixed(2);

      document.querySelectorAll('#editModal .pricing-toggle .toggle-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('#editModal .pricing-toggle .toggle-btn')[0].classList.add('active');
      document.getElementById('editPriceLabel').textContent = 'Price per item';

      document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
      currentEditingItemId = null;
    }

    function saveEdit() {
      const name = document.getElementById('editItemName').value.trim();
      const quantity = parseInt(document.getElementById('editItemQuantity').value);
      const price = parseFloat(document.getElementById('editItemPrice').value);

      if (!name || !price || price < 0) {
        alert('Please enter valid values');
        return;
      }

      const item = items.find(i => i.id === currentEditingItemId);
      if (item) {
        item.name = name;
        item.quantity = quantity;
        item.unitPrice = editPricingMode === 'individual' ? price : price / quantity;
      }

      closeEditModal();
      renderItemList();
      calculate();
    }

    function openAssignModal(itemId) {
      currentAssigningItemId = itemId;
      const item = items.find(i => i.id === itemId);
      document.getElementById('modalTitle').textContent = `Assign "${item.name}" to people`;

      const checkboxesHtml = people.map(person => {
        const isChecked = item.persons.includes(person.id);
        return `
          <div class="checkbox-item">
            <input type="checkbox" id="assign_${person.id}" value="${person.id}" ${isChecked ? 'checked' : ''} />
            <label for="assign_${person.id}">${person.name}</label>
          </div>
        `;
      }).join('');

      document.getElementById('modalCheckboxes').innerHTML = checkboxesHtml || '<p style="color: #c62828; font-size: 13px; opacity: 0.6;">Add people first</p>';
      document.getElementById('assignModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('assignModal').classList.remove('active');
      currentAssigningItemId = null;
    }

    function saveAssignment() {
      const selectedPersons = Array.from(document.querySelectorAll('#modalCheckboxes input:checked')).map(cb => parseInt(cb.value));
      const item = items.find(i => i.id === currentAssigningItemId);
      if (item) {
        item.persons = selectedPersons;
      }
      closeModal();
      renderItemList();
      calculate();
    }

    function renderPeople() {
      const list = document.getElementById('peopleList');
      if (people.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#c62828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="4"/><path d="M8 20h8v12H8z"/><circle cx="36" cy="10" r="4"/><path d="M32 20h8v12h-8z"/></svg></div><p>Add people to get started</p></div>';
        return;
      }

      list.innerHTML = people.map(person => `
        <div class="person-card">
          <div class="person-name">${person.name}</div>
          <button class="btn btn-danger btn-small" onclick="removePerson(${person.id})">Remove</button>
        </div>
      `).join('');
    }

    function renderItemList() {
      const list = document.getElementById('itemList');
      if (items.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#c62828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 14h32v22c0 2-2 4-4 4H12c-2 0-4-2-4-4V14z"/><circle cx="16" cy="10" r="2.5" fill="#c62828"/><circle cx="24" cy="8" r="2.5" fill="#c62828"/><circle cx="32" cy="10" r="2.5" fill="#c62828"/></svg></div><p>Add items to get started</p></div>';
        return;
      }

      list.innerHTML = items.map(item => {
        const personNames = item.persons.map(pid => people.find(p => p.id === pid)?.name).filter(Boolean);
        const total = (item.unitPrice * item.quantity).toFixed(2);

        return `
          <div class="item-card">
            <div class="item-header">
              <div class="item-name">${item.name}</div>
              <div class="item-price">$${total}</div>
              <button class="btn btn-danger btn-small" onclick="removeItem(${item.id})">×</button>
            </div>
            <div class="item-details">
              $${item.unitPrice.toFixed(2)} × ${item.quantity}
            </div>
            ${personNames.length > 0 ? `
              <div class="item-persons">
                ${personNames.map(name => `<div class="person-tag">${name}</div>`).join('')}
              </div>
            ` : ''}
            <div class="item-actions">
              <button class="btn btn-secondary btn-small assign-persons-btn" onclick="openAssignModal(${item.id})">
                ${personNames.length > 0 ? 'Edit people' : 'Assign people'}
              </button>
              <button class="btn btn-secondary btn-small assign-persons-btn" onclick="openEditModal(${item.id})">
                Edit
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function calculate() {
      const subtotal = items.reduce((sum, item) => sum + (item.unitPrice * item.quantity), 0);

      let taxAmount = 0;
      let tipAmount = 0;

      if (taxMode === 'percent') {
        const taxPercent = parseFloat(document.getElementById('taxAmount').value) || 0;
        taxAmount = subtotal * (taxPercent / 100);
      } else {
        taxAmount = parseFloat(document.getElementById('taxAmount').value) || 0;
      }

      if (tipMode === 'percent') {
        const tipPercent = parseFloat(document.getElementById('tipAmount').value) || 0;
        tipAmount = (subtotal + taxAmount) * (tipPercent / 100);
      } else {
        tipAmount = parseFloat(document.getElementById('tipAmount').value) || 0;
      }

      const total = subtotal + taxAmount + tipAmount;

      document.getElementById('subtotal').textContent = subtotal.toFixed(2);
      document.getElementById('taxDisplay').textContent = taxAmount.toFixed(2);
      document.getElementById('tipDisplay').textContent = tipAmount.toFixed(2);
      document.getElementById('total').textContent = total.toFixed(2);

      // Calculate per-person breakdown
      const breakdown = {};
      people.forEach(person => {
        breakdown[person.id] = { name: person.name, subtotal: 0, items: [] };
      });

      items.forEach(item => {
        if (item.persons.length > 0) {
          const itemTotal = item.unitPrice * item.quantity;
          const splitAmount = itemTotal / item.persons.length;

          item.persons.forEach(personId => {
            breakdown[personId].subtotal += splitAmount;
            breakdown[personId].items.push(`${item.name} (${item.quantity})`);
          });
        }
      });

      // Apply tax and tip proportionally
      Object.values(breakdown).forEach(person => {
        let personTax, personTip;

        if (taxMode === 'percent') {
          const taxPercent = parseFloat(document.getElementById('taxAmount').value) || 0;
          personTax = person.subtotal * (taxPercent / 100);
        } else {
          const totalSubtotal = Object.values(breakdown).reduce((sum, p) => sum + p.subtotal, 0);
          personTax = totalSubtotal > 0 ? (person.subtotal / totalSubtotal) * taxAmount : 0;
        }

        if (tipMode === 'percent') {
          const tipPercent = parseFloat(document.getElementById('tipAmount').value) || 0;
          personTip = (person.subtotal + personTax) * (tipPercent / 100);
        } else {
          const totalSubtotal = Object.values(breakdown).reduce((sum, p) => sum + p.subtotal, 0);
          personTip = totalSubtotal > 0 ? (person.subtotal / totalSubtotal) * tipAmount : 0;
        }

        person.tax = personTax;
        person.tip = personTip;
        person.total = person.subtotal + personTax + personTip;
      });

      renderBreakdown(breakdown);
    }

    function renderBreakdown(breakdown) {
      const list = document.getElementById('breakdownList');
      const validPeople = Object.values(breakdown).filter(person => person.subtotal > 0);

      if (validPeople.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#c62828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="32" height="36" rx="2"/><line x1="14" y1="14" x2="34" y2="14"/><line x1="14" y1="20" x2="34" y2="20"/><line x1="14" y1="26" x2="34" y2="26"/><line x1="14" y1="32" x2="28" y2="32"/></svg></div><p>Breakdown will appear here</p></div>';
        return;
      }

      list.innerHTML = validPeople.map(person => `
        <div class="person-breakdown">
          <div class="person-breakdown-name">${person.name}</div>
          <div class="person-breakdown-items">
            ${person.items.join(', ') || 'No items assigned'}
          </div>
          <div class="person-breakdown-amounts">
            <div class="person-breakdown-subtotal">
              Subtotal: $${person.subtotal.toFixed(2)}<br/>
              Tax & Tip: $${(person.tax + person.tip).toFixed(2)}
            </div>
            <div class="person-breakdown-total">$${person.total.toFixed(2)}</div>
          </div>
        </div>
      `).join('');

      // Store breakdown for copy function
      window.currentBreakdown = validPeople;
    }

    function copyBreakdown() {
      if (!window.currentBreakdown || window.currentBreakdown.length === 0) {
        alert('No breakdown to copy');
        return;
      }

      const subtotal = document.getElementById('subtotal').textContent;
      const tax = document.getElementById('taxDisplay').textContent;
      const tip = document.getElementById('tipDisplay').textContent;
      const total = document.getElementById('total').textContent;

      let text = 'Receipt Breakdown\n';
      text += '================\n\n';

      window.currentBreakdown.forEach(person => {
        text += `${person.name}\n`;
        text += `Items: ${person.items.join(', ')}\n`;
        text += `Subtotal: $${person.subtotal.toFixed(2)}\n`;
        text += `Tax & Tip: $${(person.tax + person.tip).toFixed(2)}\n`;
        text += `Total: $${person.total.toFixed(2)}\n\n`;
      });

      text += '================\n';
      text += `Subtotal: $${subtotal}\n`;
      text += `Tax: $${tax}\n`;
      text += `Tip: $${tip}\n`;
      text += `Total: $${total}\n`;

      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => {
          btn.textContent = originalText;
        }, 2000);
      }).catch(() => {
        alert('Failed to copy. Please try again.');
      });
    }

    // Initial render
    renderPeople();
    renderItemList();
    calculate();
  </script>
</body>
</html>
