<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      padding: 30px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 30px;
    }

    @media (max-width: 1024px) {
      .content {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    .section {
      display: flex;
      flex-direction: column;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .form-group.full {
      flex-direction: column;
      align-items: stretch;
    }

    .form-group.full .input-wrapper {
      display: flex;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
    }

    input[type="text"],
    input[type="number"],
    select {
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
      flex: 1;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #edf2f7;
      color: #2d3748;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 12px;
    }

    .btn-danger {
      background: #fc8181;
      color: white;
    }

    .btn-danger:hover {
      background: #f56565;
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      overflow-y: auto;
      max-height: 600px;
    }

    .item-card {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .item-name {
      font-weight: 600;
      color: #2d3748;
      font-size: 14px;
      flex: 1;
    }

    .item-price {
      font-size: 14px;
      font-weight: 700;
      color: #667eea;
    }

    .item-details {
      font-size: 12px;
      color: #718096;
      margin-bottom: 8px;
    }

    .item-persons {
      flex-wrap: wrap;
      gap: 6px;
      display: flex;
    }

    .person-tag {
      background: white;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      color: #2d3748;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .person-tag .remove {
      cursor: pointer;
      font-weight: bold;
      color: #a0aec0;
      hover: color #718096;
    }

    .person-tag .remove:hover {
      color: #718096;
    }

    .assign-persons-btn {
      font-size: 11px;
      padding: 4px 8px;
      margin-top: 6px;
    }

    .people-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      overflow-y: auto;
      max-height: 600px;
    }

    .person-card {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .person-name {
      font-weight: 600;
      color: #2d3748;
      font-size: 14px;
      flex: 1;
    }

    .summary-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .summary-box {
      background: #f7fafc;
      padding: 16px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .summary-label {
      font-size: 12px;
      color: #718096;
      margin-bottom: 6px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 700;
      color: #2d3748;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #a0aec0;
      font-size: 13px;
    }

    .empty-state-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .currency {
      font-size: 0.85em;
      color: #a0aec0;
      margin-right: 2px;
    }

    .pricing-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .toggle-btn {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #e2e8f0;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #718096;
      transition: all 0.2s;
    }

    .toggle-btn.active {
      border-color: #667eea;
      background: #667eea;
      color: white;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 20px;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="checkbox"] {
      cursor: pointer;
      width: 18px;
      height: 18px;
      accent-color: #667eea;
    }

    .checkbox-item label {
      margin: 0;
      cursor: pointer;
      font-size: 14px;
      color: #2d3748;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .person-breakdown {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .person-breakdown-name {
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 4px;
    }

    .person-breakdown-items {
      font-size: 11px;
      color: #718096;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .person-breakdown-amounts {
      display: flex;
      justify-content: space-between;
      padding-top: 6px;
      border-top: 1px solid #e2e8f0;
    }

    .person-breakdown-subtotal {
      font-size: 12px;
      color: #718096;
    }

    .person-breakdown-total {
      font-weight: 700;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💰 Receipt Calculator</h1>
      <p>Split bills easily with friends</p>
    </div>

    <div class="content">
      <!-- Column 1: Add People -->
      <div>
        <div class="section">
          <h2 class="section-title">People</h2>
          <div class="form-group full">
            <div class="input-wrapper">
              <input type="text" id="personName" placeholder="e.g., Alice" />
              <button class="btn btn-primary btn-small" onclick="addPerson()">Add</button>
            </div>
          </div>
          <div class="people-list" id="peopleList">
            <div class="empty-state">
              <div class="empty-state-icon">👥</div>
              <p>Add people to get started</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Column 2: Add Items -->
      <div>
        <div class="section">
          <h2 class="section-title">Items</h2>

          <div class="form-group full">
            <label>Item Name</label>
            <input type="text" id="itemName" placeholder="e.g., Caesar Salad" />
          </div>

          <div class="form-group full">
            <label>Quantity</label>
            <input type="number" id="itemQuantity" value="1" min="1" step="1" />
          </div>

          <label>Price</label>
          <div class="pricing-toggle">
            <button class="toggle-btn active" onclick="setPricingMode('individual')">Price Each</button>
            <button class="toggle-btn" onclick="setPricingMode('total')">Total Price</button>
          </div>

          <div class="form-group full">
            <label id="priceLabel">Price per item</label>
            <input type="number" id="itemPrice" placeholder="12.50" min="0" step="0.01" />
          </div>

          <button class="btn btn-primary" onclick="addItem()" style="align-self: flex-start;">Add Item</button>

          <div class="item-list" id="itemList" style="margin-top: 20px;">
            <div class="empty-state">
              <div class="empty-state-icon">🍽️</div>
              <p>Add items to get started</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Column 3: Summary & Breakdown -->
      <div>
        <!-- Settings -->
        <div class="section">
          <h2 class="section-title">Settings</h2>
          <div class="form-group full">
            <label>Tax (%)</label>
            <input type="number" id="taxPercent" value="0" min="0" max="100" step="0.1" onchange="calculate()" />
          </div>
          <div class="form-group full">
            <label>Tip (%)</label>
            <input type="number" id="tipPercent" value="0" min="0" max="100" step="0.1" onchange="calculate()" />
          </div>
        </div>

        <!-- Summary -->
        <div class="section" style="margin-top: 20px;">
          <h2 class="section-title">Summary</h2>
          <div class="summary-section">
            <div class="summary-box">
              <div class="summary-label">Subtotal</div>
              <div class="summary-value"><span class="currency">$</span><span id="subtotal">0.00</span></div>
            </div>
            <div class="summary-box">
              <div class="summary-label">Tax</div>
              <div class="summary-value"><span class="currency">$</span><span id="taxAmount">0.00</span></div>
            </div>
            <div class="summary-box">
              <div class="summary-label">Tip</div>
              <div class="summary-value"><span class="currency">$</span><span id="tipAmount">0.00</span></div>
            </div>
            <div class="summary-box" style="border-left-color: #764ba2;">
              <div class="summary-label">Total</div>
              <div class="summary-value"><span class="currency">$</span><span id="total">0.00</span></div>
            </div>
          </div>
        </div>

        <!-- Per-Person Breakdown -->
        <div class="section" style="margin-top: 20px;">
          <h2 class="section-title">Each Person Owes</h2>
          <div id="breakdownList" style="flex: 1; overflow-y: auto;">
            <div class="empty-state">
              <div class="empty-state-icon">📊</div>
              <p>Breakdown will appear here</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal for assigning people to items -->
  <div class="modal-overlay" id="assignModal">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Assign to people</div>
      <div class="checkbox-group" id="modalCheckboxes"></div>
      <div class="modal-buttons">
        <button class="btn btn-secondary btn-small" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary btn-small" onclick="saveAssignment()">Done</button>
      </div>
    </div>
  </div>

  <script>
    let people = [];
    let items = [];
    let pricingMode = 'individual';
    let currentEditingItemId = null;

    function setPricingMode(mode) {
      pricingMode = mode;
      const label = document.getElementById('priceLabel');
      label.textContent = mode === 'individual' ? 'Price per item' : 'Total price for all';

      document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }

    function addPerson() {
      const input = document.getElementById('personName');
      const name = input.value.trim();

      if (!name) {
        alert('Please enter a name');
        return;
      }

      people.push({ id: Date.now(), name });
      input.value = '';
      renderPeople();
      renderItemList();
      calculate();
    }

    function removePerson(id) {
      people = people.filter(p => p.id !== id);
      items = items.map(item => ({
        ...item,
        persons: item.persons.filter(pid => pid !== id)
      }));
      renderPeople();
      renderItemList();
      calculate();
    }

    function addItem() {
      const name = document.getElementById('itemName').value.trim();
      const price = parseFloat(document.getElementById('itemPrice').value);
      const quantity = parseInt(document.getElementById('itemQuantity').value);

      if (!name) {
        alert('Please enter an item name');
        return;
      }

      if (!price || price < 0) {
        alert('Please enter a valid price');
        return;
      }

      let unitPrice = price;
      if (pricingMode === 'total') {
        unitPrice = price / quantity;
      }

      items.push({
        id: Date.now(),
        name,
        unitPrice,
        quantity,
        persons: []
      });

      document.getElementById('itemName').value = '';
      document.getElementById('itemPrice').value = '';
      document.getElementById('itemQuantity').value = '1';

      renderItemList();
      calculate();
    }

    function removeItem(id) {
      items = items.filter(item => item.id !== id);
      renderItemList();
      calculate();
    }

    function openAssignModal(itemId) {
      currentEditingItemId = itemId;
      const item = items.find(i => i.id === itemId);
      document.getElementById('modalTitle').textContent = `Assign "${item.name}" to people`;

      const checkboxesHtml = people.map(person => {
        const isChecked = item.persons.includes(person.id);
        return `
          <div class="checkbox-item">
            <input type="checkbox" id="assign_${person.id}" value="${person.id}" ${isChecked ? 'checked' : ''} />
            <label for="assign_${person.id}">${person.name}</label>
          </div>
        `;
      }).join('');

      document.getElementById('modalCheckboxes').innerHTML = checkboxesHtml || '<p style="color: #a0aec0; font-size: 13px;">Add people first</p>';
      document.getElementById('assignModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('assignModal').classList.remove('active');
      currentEditingItemId = null;
    }

    function saveAssignment() {
      const selectedPersons = Array.from(document.querySelectorAll('#modalCheckboxes input:checked')).map(cb => parseInt(cb.value));
      const item = items.find(i => i.id === currentEditingItemId);
      if (item) {
        item.persons = selectedPersons;
      }
      closeModal();
      renderItemList();
      calculate();
    }

    function renderPeople() {
      const list = document.getElementById('peopleList');
      if (people.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👥</div><p>Add people to get started</p></div>';
        return;
      }

      list.innerHTML = people.map(person => `
        <div class="person-card">
          <div class="person-name">${person.name}</div>
          <button class="btn btn-danger btn-small" onclick="removePerson(${person.id})">Remove</button>
        </div>
      `).join('');
    }

    function renderItemList() {
      const list = document.getElementById('itemList');
      if (items.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🍽️</div><p>Add items to get started</p></div>';
        return;
      }

      list.innerHTML = items.map(item => {
        const personNames = item.persons.map(pid => people.find(p => p.id === pid)?.name).filter(Boolean);
        const total = (item.unitPrice * item.quantity).toFixed(2);

        return `
          <div class="item-card">
            <div class="item-header">
              <div class="item-name">${item.name}</div>
              <div class="item-price">$${total}</div>
              <button class="btn btn-danger btn-small" onclick="removeItem(${item.id})">×</button>
            </div>
            <div class="item-details">
              $${item.unitPrice.toFixed(2)} × ${item.quantity}
            </div>
            ${personNames.length > 0 ? `
              <div class="item-persons">
                ${personNames.map(name => `<div class="person-tag">${name}</div>`).join('')}
              </div>
            ` : ''}
            <button class="btn btn-secondary btn-small assign-persons-btn" onclick="openAssignModal(${item.id})">
              ${personNames.length > 0 ? 'Edit people' : 'Assign people'}
            </button>
          </div>
        `;
      }).join('');
    }

    function calculate() {
      // Calculate subtotal
      const subtotal = items.reduce((sum, item) => sum + (item.unitPrice * item.quantity), 0);

      // Calculate tax and tip
      const taxPercent = parseFloat(document.getElementById('taxPercent').value) || 0;
      const tipPercent = parseFloat(document.getElementById('tipPercent').value) || 0;

      const taxAmount = subtotal * (taxPercent / 100);
      const tipAmount = (subtotal + taxAmount) * (tipPercent / 100);
      const total = subtotal + taxAmount + tipAmount;

      // Update summary
      document.getElementById('subtotal').textContent = subtotal.toFixed(2);
      document.getElementById('taxAmount').textContent = taxAmount.toFixed(2);
      document.getElementById('tipAmount').textContent = tipAmount.toFixed(2);
      document.getElementById('total').textContent = total.toFixed(2);

      // Calculate per-person breakdown
      const breakdown = {};
      people.forEach(person => {
        breakdown[person.id] = { name: person.name, subtotal: 0, items: [] };
      });

      items.forEach(item => {
        if (item.persons.length > 0) {
          const itemTotal = item.unitPrice * item.quantity;
          const splitAmount = itemTotal / item.persons.length;

          item.persons.forEach(personId => {
            breakdown[personId].subtotal += splitAmount;
            breakdown[personId].items.push(`${item.name} (${item.quantity})`);
          });
        }
      });

      // Apply tax and tip proportionally
      Object.values(breakdown).forEach(person => {
        const personTax = person.subtotal * (taxPercent / 100);
        const personTip = (person.subtotal + personTax) * (tipPercent / 100);
        person.tax = personTax;
        person.tip = personTip;
        person.total = person.subtotal + personTax + personTip;
      });

      renderBreakdown(breakdown);
    }

    function renderBreakdown(breakdown) {
      const list = document.getElementById('breakdownList');
      const validPeople = Object.values(breakdown).filter(person => person.subtotal > 0);

      if (validPeople.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><p>Breakdown will appear here</p></div>';
        return;
      }

      list.innerHTML = validPeople.map(person => `
        <div class="person-breakdown">
          <div class="person-breakdown-name">${person.name}</div>
          <div class="person-breakdown-items">
            ${person.items.join(', ') || 'No items assigned'}
          </div>
          <div class="person-breakdown-amounts">
            <div class="person-breakdown-subtotal">
              Subtotal: $${person.subtotal.toFixed(2)}<br/>
              Tax & Tip: $${(person.tax + person.tip).toFixed(2)}
            </div>
            <div class="person-breakdown-total">$${person.total.toFixed(2)}</div>
          </div>
        </div>
      `).join('');
    }

    // Initial render
    renderPeople();
    renderItemList();
    calculate();
  </script>
</body>
</html>
